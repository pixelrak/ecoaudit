<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoAudit — Community Waste Logger</title>

  <!-- Leaflet CSS for map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Design tokens ───────────────────────────────── */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #21262d;
      --accent:    #3fb950;
      --accent-dim:#1a3a22;
      --warn:      #f0883e;
      --danger:    #f85149;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --plastic:   #58a6ff;
      --ewaste:    #bc8cff;
      --organic:   #3fb950;
      --metal:     #f0883e;
      --paper:     #ffa657;
      --other:     #7d8590;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: sticky;
      top: 0;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1rem;
    }

    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    .header-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Layout ──────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      min-height: calc(100vh - 61px);
    }

    /* ── Sidebar (form) ──────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }

    .sidebar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* ── Stats grid ──────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem;
    }

    .stat-card .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Category bars ───────────────────────────────── */
    .category-bars { display: flex; flex-direction: column; gap: 0.5rem; }

    .cat-row { display: flex; flex-direction: column; gap: 0.25rem; }
    .cat-header { display: flex; justify-content: space-between; font-size: 0.75rem; }
    .cat-name { font-weight: 500; }
    .cat-kg { color: var(--muted); }
    .cat-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* ── Form ────────────────────────────────────────── */
    .log-form { display: flex; flex-direction: column; gap: 0.875rem; }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
    }

    select, input[type="number"], textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 0.625rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 72px; }

    /* Location pill */
    .location-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.625rem 0.75rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 40px;
    }

    .location-pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .location-pill.captured .dot { background: var(--accent); }
    .location-pill.error .dot   { background: var(--danger); }
    .location-pill.loading .dot {
      background: var(--warn);
      animation: pulse 1s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .location-text { color: var(--muted); font-size: 0.75rem; }
    .location-pill.captured .location-text { color: var(--accent); }
    .location-pill.error .location-text    { color: var(--danger); }

    /* Geo button */
    .geo-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .geo-btn:hover { background: #264d30; }

    /* Submit button */
    .submit-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #0d1117;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.75rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .submit-btn:hover  { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.3s ease;
      z-index: 999;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.ok    { border-color: var(--accent); color: var(--accent); }
    #toast.err   { border-color: var(--danger); color: var(--danger); }

    /* ── Main area ───────────────────────────────────── */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    /* Map */
    #map {
      height: 320px;
      border-bottom: 1px solid var(--border);
      background: #0d1117;
    }

    /* Feed */
    .feed-header {
      padding: 1rem 1.5rem 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .feed-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .feed-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .feed { padding: 1rem 1.5rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 0.625rem; }

    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.875rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:none } }

    .cat-badge {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .log-info .log-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .log-weight {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: right;
    }

    .log-weight span { font-size: 0.7rem; color: var(--muted); font-weight: 400; }

    .log-name {
      font-weight: 500;
      font-size: 0.875rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
      height: 68px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      #map { height: 240px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">🌿</div>
  <h1>Eco<span>Audit</span></h1>
  <span class="header-sub">Community Waste Tracker</span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <p class="sidebar-title">Live Stats</p>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total kg logged</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-entries">—</div>
        <div class="stat-label">Total entries</div>
      </div>
    </div>

    <p class="sidebar-title">By Category</p>
    <div class="category-bars" id="cat-bars">
      <div class="skeleton"></div>
    </div>

    <p class="sidebar-title">Log Waste Entry</p>
    <div class="log-form" id="log-form">

      <label>
        Waste Category
        <select id="category" required>
          <option value="">— Select a category —</option>
          <option value="Plastic">🧴 Plastic</option>
          <option value="E-Waste">💻 E-Waste</option>
          <option value="Organic">🍃 Organic</option>
          <option value="Metal">🔩 Metal</option>
          <option value="Paper">📄 Paper</option>
          <option value="Other">📦 Other</option>
        </select>
      </label>

      <label>
        Weight (kg)
        <input type="number" id="weight" min="0.01" step="0.01" placeholder="e.g. 2.50" required />
      </label>

      <label>
        Notes (optional)
        <textarea id="notes" placeholder="e.g. Collected from roadside cleanup…"></textarea>
      </label>

      <label>
        Your Location
        <div class="location-pill" id="location-pill">
          <div class="dot"></div>
          <span class="location-text">Click below to capture location</span>
        </div>
        <button class="geo-btn" type="button" id="geo-btn">
          📍 Capture My Location
        </button>
      </label>

      <button class="submit-btn" id="submit-btn" disabled>
        Submit Entry
      </button>
    </div>

  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div id="map"></div>

    <div class="feed-header">
      <h2>All Entries</h2>
      <span class="feed-count" id="feed-count">Loading…</span>
    </div>

    <div class="feed" id="feed">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </main>

</div>

<div id="toast"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ── Config ────────────────────────────────────────────
  // Replace with your Render backend URL after deployment
  const API_BASE = "https://ecoaudit-api.onrender.com";

  // ── Category config ───────────────────────────────────
  const CATS = {
    Plastic:  { emoji: "🧴", color: "#58a6ff", bg: "#0d2137" },
    "E-Waste":{ emoji: "💻", color: "#bc8cff", bg: "#1a0d2e" },
    Organic:  { emoji: "🍃", color: "#3fb950", bg: "#0d1f0d" },
    Metal:    { emoji: "🔩", color: "#f0883e", bg: "#2a1800" },
    Paper:    { emoji: "📄", color: "#ffa657", bg: "#2a1c00" },
    Other:    { emoji: "📦", color: "#7d8590", bg: "#1a1e24" },
  };

  // ── State ─────────────────────────────────────────────
  let capturedLat = null, capturedLng = null;
  let map, markersLayer;

  // ── Map setup ─────────────────────────────────────────
  function initMap() {
    map = L.map("map", { zoomControl: true }).setView([20.5937, 78.9629], 4);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '© <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19,
    }).addTo(map);
    markersLayer = L.layerGroup().addTo(map);
  }

  function addMarker(log) {
    const cat = CATS[log.category] || CATS.Other;
    const icon = L.divIcon({
      className: "",
      html: `<div style="
        background:${cat.bg};
        border:2px solid ${cat.color};
        border-radius:50%;
        width:28px;height:28px;
        display:grid;place-items:center;
        font-size:13px;
        box-shadow:0 2px 8px rgba(0,0,0,0.5);
      ">${cat.emoji}</div>`,
      iconSize: [28, 28],
    });

    const date = new Date(log.created_at).toLocaleDateString("en-IN", {
      day:"numeric", month:"short", hour:"2-digit", minute:"2-digit"
    });

    L.marker([log.latitude, log.longitude], { icon })
      .bindPopup(`
        <b style="color:${cat.color}">${cat.emoji} ${log.category}</b><br/>
        <b>${log.weight_kg} kg</b><br/>
        <small style="color:#888">${date}</small>
        ${log.notes ? `<br/><small>${log.notes}</small>` : ""}
      `)
      .addTo(markersLayer);
  }

  // ── Geolocation ───────────────────────────────────────
  document.getElementById("geo-btn").addEventListener("click", () => {
    const pill = document.getElementById("location-pill");
    const pillText = pill.querySelector(".location-text");

    if (!navigator.geolocation) {
      setPillState(pill, pillText, "error", "Geolocation not supported by your browser.");
      return;
    }

    setPillState(pill, pillText, "loading", "Detecting your location…");
    document.getElementById("geo-btn").disabled = true;

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        capturedLat = pos.coords.latitude;
        capturedLng = pos.coords.longitude;
        setPillState(pill, pillText, "captured",
          `📍 ${capturedLat.toFixed(5)}, ${capturedLng.toFixed(5)}`);
        document.getElementById("submit-btn").disabled = false;
        document.getElementById("geo-btn").disabled = false;

        // Flash marker on map
        if (map) {
          map.setView([capturedLat, capturedLng], 14);
          L.circle([capturedLat, capturedLng], {
            radius: 80, color: "#3fb950", fillColor: "#3fb950", fillOpacity: 0.15
          }).addTo(map);
        }
      },
      (err) => {
        const msgs = {
          1: "Location access denied. Please allow location in your browser settings.",
          2: "Position unavailable. Check your GPS / network.",
          3: "Location request timed out. Try again.",
        };
        setPillState(pill, pillText, "error", msgs[err.code] || "Unknown location error.");
        document.getElementById("geo-btn").disabled = false;
      },
      { timeout: 12000, maximumAge: 0 }
    );
  });

  function setPillState(pill, span, state, text) {
    pill.className = `location-pill ${state}`;
    span.textContent = text;
  }

  // ── Fetch & render stats ──────────────────────────────
  async function loadStats() {
    try {
      const res = await fetch(`${API_BASE}/api/stats`);
      const json = await res.json();
      if (!json.success) return;

      document.getElementById("stat-total").textContent = json.grand_total_kg + " kg";
      document.getElementById("stat-entries").textContent = json.total_entries;

      const totals = json.totals_by_category;
      const max = Math.max(...Object.values(totals), 1);
      const container = document.getElementById("cat-bars");
      container.innerHTML = "";

      if (Object.keys(totals).length === 0) {
        container.innerHTML = `<p style="font-size:0.75rem;color:var(--muted)">No data yet.</p>`;
        return;
      }

      Object.entries(totals).sort((a,b) => b[1]-a[1]).forEach(([cat, kg]) => {
        const cfg = CATS[cat] || CATS.Other;
        const pct = Math.round((kg / max) * 100);
        container.innerHTML += `
          <div class="cat-row">
            <div class="cat-header">
              <span class="cat-name" style="color:${cfg.color}">${cfg.emoji} ${cat}</span>
              <span class="cat-kg">${kg} kg</span>
            </div>
            <div class="cat-bar-bg">
              <div class="cat-bar-fill" style="width:${pct}%;background:${cfg.color}"></div>
            </div>
          </div>`;
      });
    } catch (e) {
      console.error("Stats error:", e);
    }
  }

  // ── Fetch & render logs ───────────────────────────────
  async function loadLogs() {
    try {
      const res = await fetch(`${API_BASE}/api/logs`);
      const json = await res.json();
      const feed = document.getElementById("feed");
      markersLayer.clearLayers();

      if (!json.success || json.data.length === 0) {
        feed.innerHTML = `
          <div class="empty-state">
            <div class="icon">🌱</div>
            No entries yet. Be the first to log waste!
          </div>`;
        document.getElementById("feed-count").textContent = "0 entries";
        return;
      }

      document.getElementById("feed-count").textContent = `${json.data.length} entries`;
      feed.innerHTML = "";

      json.data.forEach(log => {
        addMarker(log);
        const cfg = CATS[log.category] || CATS.Other;
        const date = new Date(log.created_at).toLocaleDateString("en-IN", {
          day:"numeric", month:"short", year:"numeric",
          hour:"2-digit", minute:"2-digit"
        });
        feed.innerHTML += `
          <div class="log-card">
            <div class="cat-badge" style="background:${cfg.bg}">
              ${cfg.emoji}
            </div>
            <div class="log-info">
              <div class="log-name" style="color:${cfg.color}">${log.category}</div>
              <div class="log-meta">
                ${date} &nbsp;·&nbsp;
                ${log.latitude.toFixed(4)}, ${log.longitude.toFixed(4)}
                ${log.notes ? ` &nbsp;·&nbsp; ${log.notes}` : ""}
              </div>
            </div>
            <div class="log-weight">${log.weight_kg}<br><span>kg</span></div>
          </div>`;
      });
    } catch(e) {
      console.error("Logs error:", e);
    }
  }

  // ── Form submit ───────────────────────────────────────
  document.getElementById("submit-btn").addEventListener("click", async () => {
    const category = document.getElementById("category").value;
    const weight   = document.getElementById("weight").value;
    const notes    = document.getElementById("notes").value;

    if (!category) { showToast("Please select a waste category.", "err"); return; }
    if (!weight || parseFloat(weight) <= 0) { showToast("Enter a valid weight.", "err"); return; }
    if (!capturedLat || !capturedLng) { showToast("Please capture your location first.", "err"); return; }

    const btn = document.getElementById("submit-btn");
    btn.textContent = "Submitting…";
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/logs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          category,
          weight_kg: parseFloat(weight),
          notes,
          latitude: capturedLat,
          longitude: capturedLng,
        }),
      });

      const json = await res.json();
      if (!json.success) throw new Error(json.error);

      showToast("✅ Entry logged successfully!", "ok");
      document.getElementById("category").value = "";
      document.getElementById("weight").value = "";
      document.getElementById("notes").value = "";

      // Reload data
      await Promise.all([loadStats(), loadLogs()]);
    } catch(e) {
      showToast("Error: " + e.message, "err");
    } finally {
      btn.textContent = "Submit Entry";
      btn.disabled = false;
    }
  });

  // ── Toast ─────────────────────────────────────────────
  function showToast(msg, type = "ok") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `${type} show`;
    setTimeout(() => t.className = type, 3000);
  }

  // ── Init ──────────────────────────────────────────────
  initMap();
  loadStats();
  loadLogs();
</script>
</body>
</html>
